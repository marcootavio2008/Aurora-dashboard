{% extends "base.html" %}

{% block title %}Dash Residencial{% endblock %}

{% block page_title %}Residência{% endblock %}

{% block content %}
<h2>Controle de Luz</h2>
<label class="switch">
<input type="checkbox" onchange="controleLuz(this.checked)">
<span class="slider"></span>
</label>


<h2>Controle TV</h2>
<label class="switch">
<input type="checkbox" onchange="">
<span class="slider"></span>
</label>

<script>
  const socket = io();

  function controleLuz(valor) {
    socket.emit('comando_arduino', { tipo: 'luz', valor: valor });
  }

  socket.on('dados_sensor', function(data) {});

</script>

{% endblock %}
